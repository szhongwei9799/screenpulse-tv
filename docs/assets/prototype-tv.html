<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080, initial-scale=1.0">
<title>ScreenPulse - TV Player</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: #0a0a0f;
    color: #fff;
  }

  /* ========== ANIMATED BACKGROUND ========== */
  .bg-gradient {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .bg-gradient::before,
  .bg-gradient::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.4;
    animation: floatBlob 12s ease-in-out infinite alternate;
  }

  .bg-gradient::before {
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, #6366F1 0%, #4F46E5 40%, transparent 70%);
    top: -200px;
    left: -100px;
  }

  .bg-gradient::after {
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, #8B5CF6 0%, #7C3AED 40%, transparent 70%);
    bottom: -200px;
    right: -100px;
    animation-delay: -6s;
  }

  .bg-orb-3 {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, #3B82F6 0%, #1D4ED8 40%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    filter: blur(100px);
    opacity: 0.2;
    animation: floatBlob 15s ease-in-out infinite alternate-reverse;
  }

  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 1;
  }

  @keyframes floatBlob {
    0%   { transform: translate(0, 0) scale(1); }
    33%  { transform: translate(80px, -60px) scale(1.1); }
    66%  { transform: translate(-40px, 40px) scale(0.95); }
    100% { transform: translate(60px, 20px) scale(1.05); }
  }

  /* ========== LANDING SCREEN ========== */
  .landing-screen {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 1080px;
    padding: 80px;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .landing-screen.hidden {
    opacity: 0;
    transform: scale(0.95);
    pointer-events: none;
  }

  /* Logo */
  .logo-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 56px;
  }

  .logo-icon {
    width: 120px;
    height: 120px;
    border-radius: 32px;
    background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 50%, #A78BFA 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
    box-shadow:
      0 20px 60px rgba(99, 102, 241, 0.4),
      0 0 0 1px rgba(255,255,255,0.1) inset;
    position: relative;
    overflow: hidden;
  }

  .logo-icon::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(
      135deg,
      transparent 40%,
      rgba(255,255,255,0.15) 50%,
      transparent 60%
    );
    animation: shimmer 3s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { transform: translateX(-30%) translateY(-30%) rotate(0deg); }
    50%      { transform: translateX(30%) translateY(30%) rotate(0deg); }
  }

  .logo-icon svg {
    position: relative;
    z-index: 1;
  }

  .logo-text {
    font-size: 52px;
    font-weight: 700;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #fff 0%, #C7D2FE 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo-subtitle {
    font-size: 20px;
    color: rgba(255,255,255,0.5);
    margin-top: 8px;
    font-weight: 400;
    letter-spacing: 2px;
  }

  /* Info Card */
  .info-card {
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 24px;
    padding: 48px 64px;
    display: flex;
    align-items: center;
    gap: 56px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.3);
  }

  .info-left {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .info-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .info-label {
    font-size: 16px;
    color: rgba(255,255,255,0.45);
    font-weight: 500;
    min-width: 120px;
  }

  .info-value {
    font-size: 22px;
    color: #fff;
    font-weight: 600;
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
  }

  .info-value.ip {
    color: #A5B4FC;
  }

  .info-value.url {
    color: #818CF8;
    font-size: 20px;
  }

  .divider-v {
    width: 1px;
    height: 140px;
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.15), transparent);
  }

  /* QR Code Placeholder */
  .qr-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .qr-code {
    width: 160px;
    height: 160px;
    background: #fff;
    border-radius: 16px;
    padding: 12px;
    position: relative;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }

  .qr-code-inner {
    width: 100%;
    height: 100%;
    position: relative;
    overflow: hidden;
    border-radius: 8px;
  }

  /* Simulated QR pattern */
  .qr-pattern {
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: repeat(15, 1fr);
    grid-template-rows: repeat(15, 1fr);
    gap: 1px;
    padding: 4px;
  }

  .qr-cell {
    background: #1a1a2e;
    border-radius: 1px;
  }

  .qr-cell.empty {
    background: transparent;
  }

  /* QR position markers */
  .qr-marker {
    position: absolute;
    width: 40px;
    height: 40px;
    border: 4px solid #1a1a2e;
    border-radius: 6px;
    background: #fff;
  }

  .qr-marker::after {
    content: '';
    position: absolute;
    top: 8px;
    left: 8px;
    width: 16px;
    height: 16px;
    background: #1a1a2e;
    border-radius: 3px;
  }

  .qr-marker.tl { top: 8px; left: 8px; }
  .qr-marker.tr { top: 8px; right: 8px; }
  .qr-marker.bl { bottom: 8px; left: 8px; }

  .qr-label {
    font-size: 14px;
    color: rgba(255,255,255,0.4);
    font-weight: 500;
  }

  /* Tip text */
  .tip-text {
    margin-top: 40px;
    font-size: 18px;
    color: rgba(255,255,255,0.35);
    text-align: center;
    line-height: 1.8;
  }

  .tip-highlight {
    color: rgba(165, 180, 252, 0.7);
    font-weight: 500;
  }

  /* Status bar at bottom */
  .status-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 20;
    height: 48px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .status-left, .status-right {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #34D399;
    box-shadow: 0 0 8px rgba(52, 211, 153, 0.6);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.5; }
  }

  /* ========== PLAYING STATE OVERLAY ========== */
  .playing-overlay {
    position: fixed;
    inset: 0;
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }

  .playing-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }

  /* Simulated video background */
  .video-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0f172a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .video-bg-content {
    width: 100%;
    height: 100%;
    position: relative;
    overflow: hidden;
  }

  /* Simulated video content */
  .sim-video {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.2) 100%),
      linear-gradient(135deg, #1e3a5f 0%, #2d1b69 30%, #1a365d 60%, #1e1b4b 100%);
  }

  .sim-video-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
  }

  .play-icon-big {
    width: 80px;
    height: 80px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .sim-video-title {
    font-size: 28px;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
  }

  /* Bottom Control Bar */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 60;
    background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.7) 70%, transparent 100%);
    padding: 80px 64px 32px;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .playing-overlay.active .bottom-bar {
    transform: translateY(0);
  }

  .bottom-bar-inner {
    display: flex;
    align-items: flex-end;
    gap: 48px;
  }

  /* Current media info */
  .current-media {
    flex: 1;
    min-width: 0;
  }

  .media-info-row {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .media-thumb {
    width: 120px;
    height: 68px;
    border-radius: 12px;
    background: linear-gradient(135deg, #6366F1, #8B5CF6);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
  }

  .media-thumb::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.2) 50%, transparent 60%);
    animation: shimmer 4s ease-in-out infinite;
  }

  .media-details {
    flex: 1;
    min-width: 0;
  }

  .media-title {
    font-size: 20px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .media-meta {
    font-size: 14px;
    color: rgba(255,255,255,0.45);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* Progress bar */
  .progress-section {
    margin-top: 16px;
  }

  .progress-track {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.12);
    border-radius: 3px;
    position: relative;
    cursor: pointer;
    overflow: visible;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #6366F1, #8B5CF6);
    border-radius: 3px;
    width: 35%;
    position: relative;
    transition: width 0.3s ease;
  }

  .progress-thumb {
    position: absolute;
    right: -7px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  .progress-times {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    font-family: 'SF Mono', monospace;
  }

  /* Next item preview */
  .next-item {
    min-width: 240px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .next-label {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .next-thumb {
    width: 48px;
    height: 48px;
    border-radius: 10px;
    background: linear-gradient(135deg, #F59E0B, #EF4444);
    flex-shrink: 0;
  }

  .next-info {
    flex: 1;
    min-width: 0;
  }

  .next-title {
    font-size: 14px;
    font-weight: 500;
    color: rgba(255,255,255,0.8);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .next-duration {
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    margin-top: 2px;
  }

  /* Playback mode */
  .playback-modes {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 12px;
    min-width: 180px;
  }

  .mode-group {
    display: flex;
    gap: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 4px;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .mode-btn {
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 14px;
    color: rgba(255,255,255,0.45);
    cursor: pointer;
    transition: all 0.25s ease;
    border: none;
    background: none;
    font-family: inherit;
    white-space: nowrap;
  }

  .mode-btn:hover {
    color: rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.05);
  }

  .mode-btn.active {
    background: rgba(99, 102, 241, 0.2);
    color: #A5B4FC;
  }

  .position-info {
    font-size: 14px;
    color: rgba(255,255,255,0.4);
    text-align: right;
  }

  .position-current {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
  }

  .position-total {
    color: rgba(255,255,255,0.35);
  }

  /* ========== DEMO TOGGLE ========== */
  .demo-toggle {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 100;
    display: flex;
    gap: 8px;
  }

  .demo-btn {
    padding: 10px 24px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    color: rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    cursor: pointer;
    transition: all 0.25s ease;
    font-family: inherit;
    backdrop-filter: blur(10px);
  }

  .demo-btn:hover {
    background: rgba(255,255,255,0.12);
    color: #fff;
  }

  .demo-btn.active {
    background: rgba(99, 102, 241, 0.3);
    border-color: rgba(99, 102, 241, 0.5);
    color: #A5B4FC;
  }
</style>
</head>

<script>
  function showLanding() {
    document.getElementById('landingScreen').classList.remove('hidden');
    document.getElementById('playingOverlay').classList.remove('active');
    document.querySelectorAll('.demo-btn')[0].classList.add('active');
    document.querySelectorAll('.demo-btn')[1].classList.remove('active');
  }

  function showPlaying() {
    document.getElementById('landingScreen').classList.add('hidden');
    document.getElementById('playingOverlay').classList.add('active');
    document.querySelectorAll('.demo-btn')[0].classList.remove('active');
    document.querySelectorAll('.demo-btn')[1].classList.add('active');
  }

  // Mode button toggle
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      this.parentElement.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
    });
  });
</script>
