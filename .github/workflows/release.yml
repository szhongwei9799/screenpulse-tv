name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code with full history for changelog
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Cache Gradle dependencies
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # 4. Make gradlew executable
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. Build release APK
      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: debug.keystore
          KEYSTORE_PASSWORD: android
          KEY_ALIAS: androiddebugkey
          KEY_PASSWORD: android

      # 6. Copy APK with a clean name for release
      - name: Prepare release artifacts
        run: |
          cp app/build/outputs/apk/release/*.apk ScreenPulse-TV-Player-${{ github.ref_name }}.apk

      # 7. Generate changelog from commits
      - name: Generate changelog
        id: changelog
        run: |
          # Extract version from tag (e.g., v1.2.3 -> 1.2.3)
          VERSION=${GITHUB_REF_NAME#v}

          # Get the previous tag
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "### Version ${VERSION}" > changelog.md
          echo "" >> changelog.md
          echo "**Release Date:** $(date +%Y-%m-%d)" >> changelog.md
          echo "" >> changelog.md

          echo "### Changes" >> changelog.md
          echo "" >> changelog.md

          # Categorize commits
          FEATURES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --grep="feat\|feature\|add" --no-merges || true)
          FIXES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --grep="fix\|bug\|patch" --no-merges || true)
          OTHER=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges --invert-grep --grep="feat\|feature\|add\|fix\|bug\|patch" || true)

          if [ -n "$FEATURES" ]; then
            echo "#### 🚀 Features" >> changelog.md
            echo "$FEATURES" >> changelog.md
            echo "" >> changelog.md
          fi

          if [ -n "$FIXES" ]; then
            echo "#### 🐛 Bug Fixes" >> changelog.md
            echo "$FIXES" >> changelog.md
            echo "" >> changelog.md
          fi

          if [ -n "$OTHER" ]; then
            echo "#### 📝 Other Changes" >> changelog.md
            echo "$OTHER" >> changelog.md
            echo "" >> changelog.md
          fi

          echo "#### 📦 Downloads" >> changelog.md
          echo "" >> changelog.md
          echo "| File | Description |" >> changelog.md
          echo "|------|-------------|" >> changelog.md
          echo "| \`ScreenPulse-TV-Player-${VERSION}.apk\` | Release APK for Android TV |" >> changelog.md

          cat changelog.md

      # 8. Create GitHub Release and upload APK
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ScreenPulse TV Player ${{ github.ref_name }}
          body_path: changelog.md
          files: ScreenPulse-TV-Player-${{ github.ref_name }}.apk
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: false
