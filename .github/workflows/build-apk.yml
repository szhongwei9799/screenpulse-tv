name: Build & Release APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK for release
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk ScreenPulse-TV-Player-latest.apk

      - name: Upload Debug APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScreenPulse-debug-${{ github.sha }}
          path: ScreenPulse-TV-Player-latest.apk
          retention-days: 30

      # Create/update GitHub Release with APK for direct download
      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: ScreenPulse TV Player - Latest Build
          body: |
            ## ScreenPulse TV Player

            Android TV 数字标牌轮播播放器，支持视频/照片/IPTV/流媒体全屏轮播。

            ### 安装方法
            1. 下载下方 APK 文件
            2. 传输到 Android TV 设备
            3. 在设置中开启「允许安装未知来源应用」
            4. 打开 APK 文件安装

            ### 管理面板
            安装后打开应用，屏幕会显示管理地址和二维码，用浏览器访问即可管理播放列表。

            ---
            **构建信息：** Commit ${{ github.sha }} | ${{ github.run_number }}
          files: ScreenPulse-TV-Player-latest.apk
          draft: false
          prerelease: false
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
