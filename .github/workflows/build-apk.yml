name: Build APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'app/**'
      - '.github/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify web-admin assets
        run: |
          echo "=== Checking web-admin assets ==="
          ls -la app/src/main/assets/web-admin/
          ls -la app/src/main/assets/web-admin/js/
          ls -la app/src/main/assets/web-admin/css/
          echo "=== All assets present ==="

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenpulse-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Extract version info
        id: version
        run: |
          VERSION="v1.0.0-$(date -u +'%Y%m%d%H%M%S')"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: "Auto-built APK from commit ${{ github.sha }}"
          draft: false
          prerelease: false
          files: app/build/outputs/apk/release/app-release.apk
