name: Build APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'web-admin/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-${{ runner.os }}-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon

    - name: Generate version tag
      id: version
      run: |
        VERSION="v1.0.0-$(date +%Y%m%d%H%M%S)"
        echo "tag=$VERSION" >> $GITHUB_OUTPUT
        echo "Generated tag: $VERSION"

    - name: Rename APK
      run: |
        mv app/build/outputs/apk/release/app-release.apk \
          app/build/outputs/apk/release/ScreenPulse-TV-${{ steps.version.outputs.tag }}.apk

    - name: Upload APK to artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ScreenPulse-TV-APK
        path: app/build/outputs/apk/release/ScreenPulse-TV-${{ steps.version.outputs.tag }}.apk
        retention-days: 30

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: ScreenPulse TV APK - ${{ steps.version.outputs.tag }}
        body: |
          ## ScreenPulse TV Android TV Digital Signage Player

          ### Changes in this build:
          - Fixed admin panel flash-and-blank issue (v-cloak + error handling)
          - Added GET /api/config route for Settings page
          - Added getMacAddress utility for network info display

          ### Installation:
          1. Download the APK below
          2. Transfer to your Android TV device
          3. Enable "Install from unknown sources"
          4. Install and open the app
          5. Access the admin panel at http://<device-ip>:8080

          > Built automatically by GitHub Actions
        files: app/build/outputs/apk/release/ScreenPulse-TV-${{ steps.version.outputs.tag }}.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
