name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Ensure Android SDK platform
        run: sdkmanager "platforms" "android-33" "platforms;android-34" || true

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/*.gradle.kts', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Generate debug keystore
        run: |
          cd android/app
          keytool -genkeypair -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Build Release APK
        run: cd android && ../gradlew assembleRelease --no-daemon

      - name: Extract version from Gradle
        id: version
        run: |
          VERSION=$(grep -oP '(?<=versionName ")[^"]+' android/app/build.gradle.kts | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Prepare APK
        run: |
          cp android/app/build/outputs/apk/release/*.apk ScreenPulse-v${{ steps.version.outputs.version }}-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: ScreenPulse v${{ steps.version.outputs.version }} (#${{ github.run_number }})
          body: |
            ## ScreenPulse v${{ steps.version.outputs.version }}
            **构建时间**: ${{ github.event.head_commit.timestamp }}
            **提交**: ${{ github.sha }}
          files: ScreenPulse-v${{ steps.version.outputs.version }}-release.apk
          draft: false
          prerelease: false
