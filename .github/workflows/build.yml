name: Build Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Read version from build.gradle
        id: ver
        run: |
          VNAME=$(cat app/build.gradle | grep 'versionName' | head -1 | cut -d'"' -f2)
          echo "ver=$VNAME" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VNAME"

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/release/app-release.apk \
             ScreenPulse-v${{ steps.ver.outputs.ver }}-release.apk

      - name: Create Release and Upload APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.ver.outputs.ver }}"
          APK_NAME="ScreenPulse-v${{ steps.ver.outputs.ver }}-release.apk"
          
          # Delete old release with same tag if exists
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          
          # Create new release
          gh release create "$TAG" "$APK_NAME" \
            --title "ScreenPulse $TAG" \
            --notes "自动构建 | 提交: ${{ github.sha }}" \
            --latest
