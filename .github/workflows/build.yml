name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/*.gradle.kts') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Extract version from Gradle
        id: version
        run: |
          VERSION=$(grep -oP '(?<=versionName ")[^"]+' android/app/build.gradle.kts | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Prepare APK
        run: |
          cp android/app/build/outputs/apk/release/*.apk ScreenPulse-v${{ steps.version.outputs.version }}-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: ScreenPulse v${{ steps.version.outputs.version }} (#${{ github.run_number }})
          body: |
            ## ScreenPulse v${{ steps.version.outputs.version }}
            **构建时间**: ${{ github.event.head_commit.timestamp }}
            **提交**: ${{ github.sha }}
            **触发**: ${{ github.event_name }}
          files: ScreenPulse-v${{ steps.version.outputs.version }}-release.apk
          draft: false
          prerelease: false
