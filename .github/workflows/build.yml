name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Install Android SDK 34
        run: sdkmanager "platforms" "android-34" || true

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-v2-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-v2-${{ runner.os }}-

      - name: Generate debug keystore
        run: |
          cd android/app
          keytool -genkeypair -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Clean Gradle
        run: cd android && ../gradlew clean --no-daemon

      - name: Build Release APK (from android/ subproject)
        run: cd android && ../gradlew assembleRelease --no-daemon --no-build-cache --no-configuration-cache

      - name: Prepare APK
        run: |
          cp android/app/build/outputs/apk/release/*.apk ScreenPulse-v1.2.0-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.2.0-${{ github.run_number }}
          name: ScreenPulse v1.2.0 (#${{ github.run_number }})
          body: |
            ## ScreenPulse v1.2.0
            **构建时间**: ${{ github.event.head_commit.timestamp }}
            **提交**: ${{ github.sha }}
          files: ScreenPulse-v1.2.0-release.apk
          draft: false
          prerelease: false